# tracepoints_bin.conf — binary-protocol sync-step monitor instrumentation
#
# Rules processed in order:
#   INCLUDE <regex>   — names matching are instrumented (subject to EXCLUDE)
#   EXCLUDE <regex>   — names matching are NOT instrumented
#
# IGNORE rules are GONE in the binary protocol.  In the text protocol they
# masked cross-dialect representation differences (CSNOBOL4 stringifies a
# user-DATA value as the prototype name, SPITBOL fails CONVERT and yields
# '(undef)').  In the binary protocol both sides emit (type=DATA, len=0),
# which compare byte-equal automatically.
#
# Rules apply to functions (TRACE CALL/RETURN) and variables (TRACE VALUE).

INCLUDE  .*

# &-keywords — change frequently; dialects differ on representation.
EXCLUDE  &RANDOM
EXCLUDE  &TIME
EXCLUDE  &DATE
EXCLUDE  &STNO
EXCLUDE  &STCOUNT
EXCLUDE  &STEXEC
EXCLUDE  &.*

# SPITBOL builtins / patterns / functions.  beauty.sno re-uses some of these
# names as user functions (via FENCE.inc, etc.).  SPITBOL refuses to TRACE
# its own builtins (Error 198 "trace first argument is not appropriate name").
# CSNOBOL4 accepts.  Excluded for parity.
EXCLUDE  FENCE
EXCLUDE  SUCCEED
EXCLUDE  FAIL
EXCLUDE  ABORT
EXCLUDE  ARB
EXCLUDE  BAL
EXCLUDE  REM
EXCLUDE  ANY
EXCLUDE  NOTANY
EXCLUDE  BREAK
EXCLUDE  SPAN
EXCLUDE  LEN
EXCLUDE  POS
EXCLUDE  RPOS
EXCLUDE  TAB
EXCLUDE  RTAB
EXCLUDE  ARBNO
EXCLUDE  REPLACE
EXCLUDE  TRIM
EXCLUDE  EVAL
EXCLUDE  APPLY
EXCLUDE  LOAD
EXCLUDE  UNLOAD
EXCLUDE  HOST
EXCLUDE  TRACE
EXCLUDE  STOPTR
EXCLUDE  TERMINAL
EXCLUDE  INPUT
EXCLUDE  OUTPUT
EXCLUDE  CONVERT
EXCLUDE  DIFFER
EXCLUDE  IDENT
EXCLUDE  INTEGER
EXCLUDE  LGT
EXCLUDE  EQ
EXCLUDE  NE
EXCLUDE  LT
EXCLUDE  GT
EXCLUDE  LE
EXCLUDE  GE
EXCLUDE  SIZE
EXCLUDE  DUPL
EXCLUDE  ITEM
EXCLUDE  DUMP
EXCLUDE  OPSYN
EXCLUDE  DETACH
EXCLUDE  EJECT
EXCLUDE  ENDFILE
EXCLUDE  REWIND
EXCLUDE  BACKSPACE
EXCLUDE  CODE
EXCLUDE  COPY
EXCLUDE  DATA
EXCLUDE  FUNCTION
EXCLUDE  DEFINE
EXCLUDE  EXIT
EXCLUDE  CHAR
EXCLUDE  ORD
EXCLUDE  DATATYPE
EXCLUDE  ARRAY
EXCLUDE  PROTOTYPE
EXCLUDE  TABLE
EXCLUDE  STRING
EXCLUDE  EBCDIC
EXCLUDE  ASCII
EXCLUDE  TIME
EXCLUDE  DATE

# Internal monitor scaffolding — must never be instrumented.
EXCLUDE  MV
EXCLUDE  MC
EXCLUDE  MR
EXCLUDE  MON_.*
